<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ARIA — Secretaria Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0D0F14;
  --surface: #141720;
  --card:    #1C2030;
  --border:  #252A3A;
  --accent:  #7C6EF5;
  --accent2: #B8ACFF;
  --gold:    #F0C060;
  --green:   #4ADE80;
  --red:     #F87171;
  --text:    #E8EAF0;
  --muted:   #6B7280;
  --nav-h:   60px;
  --top-h:   54px;
  --safe-b:  env(safe-area-inset-bottom, 0px);
}

html { height: 100%; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  /* no overflow:hidden — let the browser handle it */
  display: flex;
  flex-direction: column;
}

/* ── APP SHELL ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh; /* dynamic viewport height — critical on mobile Chrome */
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  flex-shrink: 0;
  height: var(--top-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  z-index: 10;
}
.topbar-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--accent2);
}
.topbar-logo em { color: var(--gold); font-style: italic; }
.topbar-sub { font-size: 11px; color: var(--muted); }
.online-dot {
  margin-left: auto;
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--muted);
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── PAGE CONTENT ── */
.pages {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.page {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.page.active { display: flex; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  flex-shrink: 0;
  height: calc(var(--nav-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 10;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  cursor: pointer;
  padding: 6px 0;
  transition: color .15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-item .nav-icon { font-size: 22px; line-height: 1; }
.nav-item.active { color: var(--accent2); }

/* ── CHAT PAGE ── */
#page-chat { background: var(--bg); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 14px 6px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  display: flex;
  gap: 8px;
  max-width: 88%;
  animation: fadeUp .2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0; margin-top: 2px;
}
.msg.aria .msg-avatar { background: var(--accent); }
.msg.user .msg-avatar { background: var(--card); border: 1px solid var(--border); }
.msg-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 10px 14px;
  font-size: 14.5px;
  line-height: 1.55;
}
.msg.aria .msg-bubble  { border-top-left-radius: 4px; }
.msg.user .msg-bubble  { background: var(--accent); border-color: var(--accent); color: #fff; border-top-right-radius: 4px; }
.msg-time { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 4px; }

.typing-indicator { display: flex; gap: 4px; align-items: center; }
.typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: tdot .8s infinite; }
.typing-dot:nth-child(2) { animation-delay: .15s; }
.typing-dot:nth-child(3) { animation-delay: .3s; }
@keyframes tdot { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

/* ── INPUT BAR — always visible, sticks to bottom of page ── */
.input-bar {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 12px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
}
.input-bar textarea {
  flex: 1;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 22px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  padding: 10px 16px;
  resize: none;
  outline: none;
  line-height: 1.4;
  max-height: 110px;
  min-height: 44px;
  transition: border-color .2s;
  -webkit-appearance: none;
}
.input-bar textarea:focus { border-color: var(--accent); }
.input-bar textarea::placeholder { color: var(--muted); }

.ib-btn {
  width: 44px; height: 44px;
  flex-shrink: 0;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  transition: transform .1s, opacity .15s;
  -webkit-tap-highlight-color: transparent;
}
.ib-btn:active { transform: scale(.9); }
.btn-mic  { background: var(--card); border: 1.5px solid var(--border); }
.btn-mic.recording { background: var(--red); border-color: var(--red); animation: blink .8s infinite; }
.btn-send { background: var(--accent); }

/* ── GENERIC PAGE HEADER ── */
.page-header {
  flex-shrink: 0;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-header h2 { font-family: 'DM Serif Display', serif; font-size: 20px; }
.btn-add {
  background: var(--accent); color: #fff;
  border: none; padding: 8px 16px;
  border-radius: 20px; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; gap: 5px;
}

/* ── AGENDA ── */
.scroll-area {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.agenda-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.agenda-card.done { opacity: .45; }
.a-date { font-size: 11px; color: var(--accent2); font-variant-numeric: tabular-nums; margin-bottom: 4px; }
.a-title { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
.a-desc  { font-size: 13px; color: var(--muted); line-height: 1.45; }
.a-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.tag { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.tag.work     { background:#1e3a5f; color:#60a5fa; }
.tag.personal { background:#1a3a1a; color:#4ade80; }
.tag.meeting  { background:#2a1a3a; color:#c084fc; }
.tag.urgent   { background:#3a1a1a; color:#f87171; }
.a-actions { display: flex; gap: 8px; }
.a-actions button { background:none; border:none; font-size:18px; cursor:pointer; opacity:.6; }
.a-actions button:active { opacity:1; }

/* ── TASKS ── */
.task-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 13px 14px;
  display: flex; align-items: center; gap: 12px;
}
.task-item.done .task-title { text-decoration: line-through; opacity: .4; }
.task-check {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; transition: all .15s;
}
.task-item.done .task-check { background: var(--green); border-color: var(--green); }
.task-title { flex: 1; font-size: 14.5px; }
.task-meta  { font-size: 11px; color: var(--muted); }
.task-del   { background:none; border:none; cursor:pointer; font-size:17px; opacity:.5; }
.task-del:active { opacity:1; }

/* ── MEMORY PAGE ── */
.mem-page-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
.memory-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
}
.mem-key  { font-size: 11px; color: var(--accent2); font-weight: 600; margin-bottom: 2px; }
.mem-val  { font-size: 13.5px; color: var(--text); }
.mem-del  { background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted); flex-shrink:0; }
.mem-del:active { color: var(--red); }
.mem-empty { color:var(--muted); font-size:13px; padding:20px 14px; line-height:1.6; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.75); backdrop-filter: blur(4px);
  z-index: 200; align-items: flex-end; justify-content: center;
  padding-bottom: var(--safe-b);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + var(--safe-b));
  width: 100%;
  max-width: 520px;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:none;opacity:1} }
.modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
.modal h3 { font-family:'DM Serif Display',serif; font-size:18px; margin-bottom:16px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; color:var(--muted); margin-bottom:5px; letter-spacing:.5px; text-transform:uppercase; }
.field input, .field textarea, .field select {
  width:100%; background:var(--bg);
  border:1.5px solid var(--border); border-radius:10px;
  color:var(--text); font-family:'Inter',sans-serif;
  font-size:15px; padding:10px 12px; outline:none;
  -webkit-appearance:none;
}
.field input:focus,.field textarea:focus,.field select:focus { border-color:var(--accent); }
.field textarea { resize:vertical; min-height:80px; }
.field select option { background:var(--card); }
.modal-actions { display:flex; gap:10px; margin-top:20px; }
.btn-cancel  { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--muted); padding:12px; border-radius:10px; font-size:14px; cursor:pointer; }
.btn-confirm { flex:2; background:var(--accent); color:#fff; border:none; padding:12px; border-radius:10px; font-size:14px; cursor:pointer; font-weight:500; }

/* ── DESKTOP tweaks ── */
@media (min-width: 640px) {
  .bottom-nav { display: none; }
  .app { flex-direction: row; flex-wrap: wrap; }
  .topbar { width: 100%; }
  .pages { flex: 1; }

  /* show a permanent left sidebar */
  .desktop-sidebar {
    display: flex !important;
    width: 220px;
    flex-shrink: 0;
    flex-direction: column;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px 10px;
    gap: 4px;
  }
  .desktop-sidebar .ds-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    background: none; border: none;
    color: var(--text); font-family:'Inter',sans-serif;
    font-size: 13px; cursor: pointer; text-align: left;
    transition: background .15s;
  }
  .desktop-sidebar .ds-btn:hover { background: var(--card); }
  .desktop-sidebar .ds-btn.active { background: var(--accent); color: #fff; }
  .desktop-sidebar .ds-icon { font-size:18px; width:22px; text-align:center; }

  .modal-overlay { align-items: center; padding-bottom: 0; }
  .modal { border-radius: 16px; padding: 24px; max-width: 440px; }
}
@media (min-width: 640px) {
  .desktop-sidebar { display: flex; }
}
.desktop-sidebar { display: none; }
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">ARIA<em>.</em></div>
    <span class="topbar-sub" id="view-label">Chat</span>
    <div class="online-dot"><div class="dot"></div> En línea</div>
  </header>

  <!-- DESKTOP SIDEBAR -->
  <nav class="desktop-sidebar" id="desktop-sidebar">
    <button class="ds-btn active" onclick="switchPage('chat',this)"><span class="ds-icon">💬</span> Chat</button>
    <button class="ds-btn" onclick="switchPage('agenda',this)"><span class="ds-icon">📅</span> Agenda</button>
    <button class="ds-btn" onclick="switchPage('tasks',this)"><span class="ds-icon">✅</span> Tareas</button>
    <button class="ds-btn" onclick="switchPage('memory',this)"><span class="ds-icon">🧠</span> Memoria</button>
  </nav>

  <!-- PAGES -->
  <div class="pages">

    <!-- CHAT -->
    <div class="page active" id="page-chat">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="input-bar">
        <button class="ib-btn btn-mic" id="btn-mic" onclick="toggleVoice()" title="Voz">🎤</button>
        <textarea id="chat-input" placeholder="Escríbeme o usa el micrófono…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
          oninput="autoResize(this)"></textarea>
        <button class="ib-btn btn-send" onclick="sendMessage()" title="Enviar">➤</button>
      </div>
    </div>

    <!-- AGENDA -->
    <div class="page" id="page-agenda">
      <div class="page-header">
        <h2>📅 Agenda</h2>
        <button class="btn-add" onclick="openAgendaModal()">+ Evento</button>
      </div>
      <div class="scroll-area" id="agenda-list"></div>
    </div>

    <!-- TASKS -->
    <div class="page" id="page-tasks">
      <div class="page-header">
        <h2>✅ Tareas</h2>
        <button class="btn-add" onclick="openTaskModal()">+ Tarea</button>
      </div>
      <div class="scroll-area" id="tasks-list"></div>
    </div>

    <!-- MEMORY -->
    <div class="page" id="page-memory">
      <div class="page-header">
        <h2>🧠 Memoria de ARIA</h2>
        <button class="btn-add" style="background:var(--red)" onclick="clearMemory()">Limpiar</button>
      </div>
      <div class="mem-page-list" id="mem-page-list"></div>
    </div>

  </div>

  <!-- BOTTOM NAV (mobile only) -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchPage('chat',this)" data-page="chat">
      <span class="nav-icon">💬</span>Chat
    </button>
    <button class="nav-item" onclick="switchPage('agenda',this)" data-page="agenda">
      <span class="nav-icon">📅</span>Agenda
    </button>
    <button class="nav-item" onclick="switchPage('tasks',this)" data-page="tasks">
      <span class="nav-icon">✅</span>Tareas
    </button>
    <button class="nav-item" onclick="switchPage('memory',this)" data-page="memory">
      <span class="nav-icon">🧠</span>Memoria
    </button>
  </nav>
</div>

<!-- MODAL AGENDA -->
<div class="modal-overlay" id="agenda-modal" onclick="if(event.target===this)closeModal('agenda-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>📅 Nuevo Evento</h3>
    <div class="field"><label>Título</label><input id="a-title" placeholder="Reunión con cliente..."></div>
    <div class="field"><label>Fecha y hora</label><input id="a-date" type="datetime-local"></div>
    <div class="field"><label>Descripción</label><textarea id="a-desc" placeholder="Detalles..."></textarea></div>
    <div class="field">
      <label>Categoría</label>
      <select id="a-cat">
        <option value="work">💼 Trabajo</option>
        <option value="personal">🌿 Personal</option>
        <option value="meeting">🎯 Reunión</option>
        <option value="urgent">🚨 Urgente</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('agenda-modal')">Cancelar</button>
      <button class="btn-confirm" onclick="saveAgendaItem()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL TAREA -->
<div class="modal-overlay" id="task-modal" onclick="if(event.target===this)closeModal('task-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>✅ Nueva Tarea</h3>
    <div class="field"><label>Tarea</label><input id="t-title" placeholder="Llamar al proveedor..."></div>
    <div class="field"><label>Fecha límite (opcional)</label><input id="t-due" type="date"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('task-modal')">Cancelar</button>
      <button class="btn-confirm" onclick="saveTask()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──
const API = "https://api.anthropic.com/v1/messages";
const state = {
  memory: JSON.parse(localStorage.getItem('aria_memory')||'{}'),
  agenda: JSON.parse(localStorage.getItem('aria_agenda')||'[]'),
  tasks:  JSON.parse(localStorage.getItem('aria_tasks') ||'[]'),
  chat:   [],
};
function save() {
  localStorage.setItem('aria_memory', JSON.stringify(state.memory));
  localStorage.setItem('aria_agenda', JSON.stringify(state.agenda));
  localStorage.setItem('aria_tasks',  JSON.stringify(state.tasks));
}

// ── NAVIGATION ──
const pageLabels = { chat:'Chat', agenda:'Agenda', tasks:'Tareas', memory:'Memoria' };
function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item, .ds-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (btn) btn.classList.add('active');
  // also sync the other nav
  document.querySelectorAll(`[data-page="${name}"], .ds-btn`).forEach(b => {
    if (b.textContent.trim().toLowerCase().startsWith(pageLabels[name].toLowerCase().charAt(0))) {
      // rough match — handled above
    }
  });
  document.getElementById('view-label').textContent = pageLabels[name];
  if (name==='agenda') renderAgenda();
  if (name==='tasks')  renderTasks();
  if (name==='memory') renderMemoryPage();
}

// ── CHAT ──
function ts() { return new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'}); }

function appendMsg(role, html) {
  const wrap = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className = 'msg '+role;
  const av = role==='aria'?'🤖':'👤';
  const avBg = role==='aria'?'':'';
  d.innerHTML = `<div class="msg-avatar">${av}</div><div><div class="msg-bubble">${html}</div><div class="msg-time">${ts()}</div></div>`;
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  const wrap = document.getElementById('chat-messages');
  const d = document.createElement('div');
  d.className='msg aria'; d.id='typing';
  d.innerHTML=`<div class="msg-avatar">🤖</div><div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  wrap.appendChild(d);
  wrap.scrollTop = wrap.scrollHeight;
}
function hideTyping() { const t=document.getElementById('typing'); if(t)t.remove(); }

function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,110)+'px';
}

async function sendMessage() {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim(); if(!txt) return;
  inp.value=''; inp.style.height='auto';
  appendMsg('user', escHtml(txt));
  state.chat.push({role:'user',content:txt});
  showTyping();

  const now = new Date().toLocaleString('es',{dateStyle:'full',timeStyle:'short'});
  const mem = Object.entries(state.memory).map(([k,v])=>`• ${k}: ${v}`).join('\n')||'Sin datos.';
  const ag  = state.agenda.slice(-5).map(e=>`• [${e.date||'?'}] ${e.title}`).join('\n')||'Vacía.';
  const tk  = state.tasks.filter(t=>!t.done).slice(-5).map(t=>`• ${t.title}`).join('\n')||'Sin pendientes.';

  const sys = `Eres ARIA, secretaria virtual inteligente, cálida y eficiente. Siempre hablas en español.
Fecha/hora: ${now}

MEMORIA DEL USUARIO:
${mem}

AGENDA PRÓXIMA:
${ag}

TAREAS PENDIENTES:
${tk}

REGLAS DE SALIDA:
- Si el usuario menciona datos personales, guárdalos emitiendo al FINAL de tu respuesta: MEMORIA:{"clave":"valor"}
- Si piden evento en agenda: AGENDA:{"title":"...","date":"YYYY-MM-DDTHH:MM","desc":"...","cat":"work|personal|meeting|urgent"}
- Si piden tarea: TAREA:{"title":"...","due":"YYYY-MM-DD"}
- Responde natural, útil y breve. No menciones los comandos al usuario.`;

  try {
    const res = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000, system:sys, messages:state.chat.slice(-12) })
    });
    const data = await res.json();
    let reply = data.content?.[0]?.text || '⚠️ Sin respuesta.';
    let display = reply;

    // Parse MEMORIA
    const mM = reply.match(/MEMORIA:(\{[^}]+\})/);
    if (mM) { try { Object.assign(state.memory, JSON.parse(mM[1])); save(); } catch(e){} display=display.replace(/MEMORIA:\{[^}]+\}/,'').trim(); }

    // Parse AGENDA
    const mA = reply.match(/AGENDA:(\{[^}]+\})/);
    if (mA) { try { state.agenda.push({id:Date.now(),...JSON.parse(mA[1]),done:false}); save(); display=display.replace(/AGENDA:\{[^}]+\}/,'').trim()+'\n\n📅 ¡Evento añadido a tu agenda!'; } catch(e){} }

    // Parse TAREA
    const mT = reply.match(/TAREA:(\{[^}]+\})/);
    if (mT) { try { state.tasks.push({id:Date.now(),...JSON.parse(mT[1]),done:false}); save(); display=display.replace(/TAREA:\{[^}]+\}/,'').trim()+'\n\n✅ ¡Tarea añadida!'; } catch(e){} }

    hideTyping();
    appendMsg('aria', escHtml(display.trim()).replace(/\n/g,'<br>'));
    state.chat.push({role:'assistant',content:reply});
  } catch(e) {
    hideTyping();
    appendMsg('aria','⚠️ Error de conexión. Intenta de nuevo.');
  }
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── VOICE ──
let rec=null, recording=false;
function toggleVoice() {
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR) { alert('Usa Chrome para reconocimiento de voz.'); return; }
  const btn=document.getElementById('btn-mic'), inp=document.getElementById('chat-input');
  if (recording) { rec.stop(); return; }
  rec = new SR();
  rec.lang='es-ES'; rec.continuous=false; rec.interimResults=true;
  rec.onstart=()=>{ recording=true; btn.classList.add('recording'); btn.textContent='⏹️'; };
  rec.onresult=e=>{ inp.value=Array.from(e.results).map(r=>r[0].transcript).join(''); autoResize(inp); };
  rec.onend=()=>{ recording=false; btn.classList.remove('recording'); btn.textContent='🎤'; if(inp.value.trim()) sendMessage(); };
  rec.onerror=()=>{ recording=false; btn.classList.remove('recording'); btn.textContent='🎤'; };
  rec.start();
}

// ── AGENDA ──
const catLabel = {work:'💼 Trabajo',personal:'🌿 Personal',meeting:'🎯 Reunión',urgent:'🚨 Urgente'};
function renderAgenda() {
  const el=document.getElementById('agenda-list');
  const sorted=[...state.agenda].sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!sorted.length){el.innerHTML='<div style="color:var(--muted);padding:10px">Sin eventos aún. ¡Dile a ARIA que agende algo!</div>';return;}
  el.innerHTML=sorted.map(ev=>{
    const d=ev.date?new Date(ev.date).toLocaleString('es',{dateStyle:'medium',timeStyle:'short'}):'—';
    return `<div class="agenda-card${ev.done?' done':''}">
      <div class="a-date">🗓 ${d}</div>
      <div class="a-title">${escHtml(ev.title)}</div>
      ${ev.desc?`<div class="a-desc">${escHtml(ev.desc)}</div>`:''}
      <div class="a-footer">
        <span class="tag ${ev.cat||'work'}">${catLabel[ev.cat]||'💼'}</span>
        <div class="a-actions">
          <button onclick="toggleAgenda(${ev.id})">${ev.done?'↩️':'✅'}</button>
          <button onclick="delAgenda(${ev.id})">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function openAgendaModal(){
  const now=new Date(); now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  document.getElementById('a-date').value=now.toISOString().slice(0,16);
  document.getElementById('a-title').value='';
  document.getElementById('a-desc').value='';
  document.getElementById('agenda-modal').classList.add('open');
}
function saveAgendaItem(){
  const t=document.getElementById('a-title').value.trim(); if(!t) return;
  state.agenda.push({id:Date.now(),title:t,date:document.getElementById('a-date').value,desc:document.getElementById('a-desc').value.trim(),cat:document.getElementById('a-cat').value,done:false});
  save(); closeModal('agenda-modal'); renderAgenda();
}
function toggleAgenda(id){ const e=state.agenda.find(e=>e.id===id); if(e){e.done=!e.done;save();renderAgenda();} }
function delAgenda(id){ state.agenda=state.agenda.filter(e=>e.id!==id); save(); renderAgenda(); }

// ── TASKS ──
function renderTasks(){
  const el=document.getElementById('tasks-list');
  if(!state.tasks.length){el.innerHTML='<div style="color:var(--muted);padding:10px">Sin tareas. ¡Dile a ARIA o añade una!</div>';return;}
  const all=[...state.tasks.filter(t=>!t.done),...state.tasks.filter(t=>t.done)];
  el.innerHTML=all.map(t=>`<div class="task-item${t.done?' done':''}">
    <div class="task-check" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
    <div class="task-title">${escHtml(t.title)}</div>
    ${t.due?`<div class="task-meta">${t.due}</div>`:''}
    <button class="task-del" onclick="delTask(${t.id})">🗑️</button>
  </div>`).join('');
}
function openTaskModal(){ document.getElementById('t-title').value=''; document.getElementById('t-due').value=''; document.getElementById('task-modal').classList.add('open'); }
function saveTask(){ const t=document.getElementById('t-title').value.trim(); if(!t) return; state.tasks.push({id:Date.now(),title:t,due:document.getElementById('t-due').value,done:false}); save(); closeModal('task-modal'); renderTasks(); }
function toggleTask(id){ const t=state.tasks.find(t=>t.id===id); if(t){t.done=!t.done;save();renderTasks();} }
function delTask(id){ state.tasks=state.tasks.filter(t=>t.id!==id); save(); renderTasks(); }

// ── MEMORY PAGE ──
function renderMemoryPage(){
  const el=document.getElementById('mem-page-list');
  const entries=Object.entries(state.memory);
  if(!entries.length){el.innerHTML='<div class="mem-empty">ARIA aprenderá sobre ti automáticamente mientras hablas con ella.<br><br>Por ejemplo, dile:<br>• "Me llamo Juan"<br>• "Mi empresa es CML Locaciones"<br>• "Mi número es 311 555 0000"</div>';return;}
  el.innerHTML=entries.map(([k,v])=>`<div class="memory-item">
    <div><div class="mem-key">${escHtml(k)}</div><div class="mem-val">${escHtml(v)}</div></div>
    <button class="mem-del" onclick="delMem('${k}')">×</button>
  </div>`).join('');
}
function delMem(k){ delete state.memory[k]; save(); renderMemoryPage(); }
function clearMemory(){ if(confirm('¿Borrar toda la memoria de ARIA?')){ state.memory={}; save(); renderMemoryPage(); } }

// ── MODAL ──
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ── INIT ──
appendMsg('aria', '¡Hola! Soy <strong>ARIA</strong>, tu secretaria virtual 🤖<br>Puedes escribirme o usar el <strong>🎤 micrófono</strong>.<br>Cuéntame, ¿en qué te ayudo hoy?');
</script>
